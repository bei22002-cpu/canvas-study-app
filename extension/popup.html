<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 14px; width: 260px; color: #1a2744; }
    h1 { font-size: 15px; margin: 0 0 8px; }
    p { font-size: 12px; color: #6b7280; line-height: 1.5; margin: 0 0 12px; }
    button {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      background: #1a2744; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>Canvas Study</h1>
  <p>Open the study panel on your current Canvas tab — assistant, materials, library, and tutor.</p>
  <button id="openBtn" type="button">Open panel on this tab</button>
  <script src="popup.js"></script>
</body>
</html>
